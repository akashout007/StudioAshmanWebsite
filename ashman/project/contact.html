<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — Ashman Studio</title>
<link rel="stylesheet" href="css/colors_and_type.css"/>
<link rel="stylesheet" href="css/site.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.contact-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 96px; align-items: start; padding: 32px 0 96px; }
.contact-meta { padding-top: 48px; }
.contact-meta h3 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 18px; letter-spacing: -.01em; }
.contact-meta h3 em { font-style: italic; color: var(--accent); }
.contact-meta p { font-size: 14px; color: var(--mid); line-height: 1.85; font-weight: 300; margin-bottom: 14px; max-width: 36ch; }
.contact-meta a { color: var(--ink); border-bottom: 0.5px solid var(--accent); padding-bottom: 1px; transition: color var(--dur-base) var(--ease); }
.contact-meta a:hover { color: var(--accent); }
.contact-meta .block { padding: 22px 0; border-bottom: .5px solid var(--light); }
.contact-meta .block:first-child { border-top: .5px solid var(--light); }

.studio-card {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  background: var(--ink); color: var(--paper);
  border-bottom: var(--border-dk);
}
.studio-card:last-child { border-bottom: 0; }
.studio-card .map {
  aspect-ratio: 4/3; position: relative; overflow: hidden;
  border-right: 0.5px solid rgba(242,239,232,0.1);
  background: var(--ink);
}
.studio-card .map svg { width: 100%; height: 100%; }
.studio-card .body { padding: 56px 48px; display: flex; flex-direction: column; justify-content: space-between; }
.studio-card .lab { font-family: var(--font-label); font-size: 9px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--accent-lt); margin-bottom: 22px; display: flex; align-items: center; gap: 14px; }
.studio-card .lab::before { content: ''; display: block; width: 24px; height: 1px; background: var(--accent-lt); }
.studio-card h2 { font-family: var(--font-display); font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -.025em; margin-bottom: 8px; }
.studio-card h2 em { font-style: italic; font-weight: 600; color: var(--accent); }
.studio-card .role { font-family: var(--font-label); font-size: 10px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: rgba(242,239,232,.6); margin-bottom: 36px; }
.studio-card .lines { font-family: var(--font-body); font-size: 15px; font-weight: 300; line-height: 1.85; color: rgba(242,239,232,.85); margin-bottom: 32px; }
.studio-card .lines a { color: var(--accent-lt); }
.studio-card .meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; padding-top: 28px; border-top: 0.5px solid rgba(242,239,232,0.1); }
.studio-card .meta .k { font-family: var(--font-label); font-size: 9px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: rgba(242,239,232,.5); margin-bottom: 6px; }
.studio-card .meta .v { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--paper); }
.studio-card .meta .v em { color: var(--accent); font-style: italic; font-weight: 500; }
</style>
</head>
<body data-screen-label="Contact">
<div id="root"></div>
<script type="text/babel" src="js/shared.jsx"></script>
<script type="text/babel">

const PageHead = () => (
  <section className="ash-wrap">
    <div className="ash-pagehead">
      <div>
        <div className="ash-breadcrumb">
          <a href="index.html">Ashman.Studio</a>
          <span className="sep">/</span>
          <span className="crumb-on">Contact</span>
        </div>
        <div className="ash-eyebrow"><span className="dash"></span>04 — Get in touch</div>
        <h1>Tell us about<br/>your <em>space</em>.</h1>
      </div>
      <p className="lede">
        Most engagements start with a 60-minute call and an audit walk-through. Share as
        much or as little as you like below — we'll come back within two working days
        with a sense of fit, scope and timing.
      </p>
    </div>
  </section>
);

const SERVICES = ['Wayfinding', 'Sign design', 'Environmental graphics', 'Brand activation', 'Retail environments', 'Spatial identity', 'Not sure yet'];

const ContactForm = () => {
  const [sent, setSent] = useState(false);
  const [chips, setChips] = useState([]);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [org, setOrg] = useState('');
  const [budget, setBudget] = useState('');
  const [message, setMessage] = useState('');
  const toggle = (c) => setChips(chips.includes(c) ? chips.filter(x => x !== c) : [...chips, c]);
  const submit = (e) => { e.preventDefault(); if (name && email && message) setSent(true); };

  if (sent) {
    return (
      <div style={{padding: '32px 0 64px'}}>
        <div className="ash-notif">
          <div className="ash-notif-lab">Confirmation · Reference 2026-{Math.floor(Math.random()*900+100)}</div>
          <div style={{fontFamily:'var(--font-display)', fontSize: 28, fontWeight: 600, lineHeight: 1.2, marginBottom: 14}}>Thank you, {name.split(' ')[0] || 'friend'}.</div>
          <div style={{fontSize: 14, color: 'rgba(242,239,232,.65)', lineHeight: 1.75, fontWeight: 300, maxWidth: '52ch'}}>
            Your message has been sent to <span style={{color:'var(--accent-lt)'}}>hello@ashman.studio</span>.
            Akash will reply within two working days. If it's urgent, the New Delhi studio
            is on +91 11 4612 0042.
          </div>
        </div>
      </div>
    );
  }
  return (
    <form onSubmit={submit} style={{padding: '32px 0 64px'}}>
      <div className="ash-field-row">
        <div className="ash-field">
          <label>Your name</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="James Holborn"/>
        </div>
        <div className="ash-field">
          <label>Email</label>
          <input value={email} onChange={e => setEmail(e.target.value)} placeholder="james@studio.com"/>
        </div>
      </div>
      <div className="ash-field-row">
        <div className="ash-field">
          <label>Organisation</label>
          <input value={org} onChange={e => setOrg(e.target.value)} placeholder="Holborn & Co."/>
        </div>
        <div className="ash-field">
          <label>Indicative budget</label>
          <select value={budget} onChange={e => setBudget(e.target.value)}>
            <option value="">Select a range</option>
            <option>Under £50k</option>
            <option>£50k — £150k</option>
            <option>£150k — £500k</option>
            <option>£500k — £1m</option>
            <option>£1m+</option>
            <option>Not sure yet</option>
          </select>
        </div>
      </div>
      <div className="ash-field">
        <label>What are you exploring?</label>
        <div className="ash-chips">
          {SERVICES.map(s => (
            <button type="button" key={s} className={'ash-chip ' + (chips.includes(s) ? 'on' : '')} onClick={() => toggle(s)}>{s}</button>
          ))}
        </div>
      </div>
      <div className="ash-field">
        <label>Tell us about your project</label>
        <textarea value={message} onChange={e => setMessage(e.target.value)} placeholder="A new terminal? A flagship store? A library that's lost its way? Share as much or as little as you like — site, scale, who's involved, when you'd like to be open."/>
      </div>
      <div style={{marginTop: 32, display: 'flex', gap: 18, alignItems: 'center', flexWrap: 'wrap'}}>
        <button className="btn-primary" type="submit">Send message →</button>
        <span style={{fontFamily:'var(--font-label)', fontSize: 9, fontWeight: 700, letterSpacing: '.22em', textTransform:'uppercase', color: 'var(--mid)'}}>Or email <a href="mailto:hello@ashman.studio" style={{color:'var(--ink)', borderBottom: '.5px solid var(--accent)', paddingBottom: 1}}>hello@ashman.studio</a></span>
      </div>
    </form>
  );
};

const ContactBlock = () => (
  <section className="ash-wrap">
    <div className="contact-grid">
      <div>
        <div className="ash-eyebrow muted" style={{marginBottom: 28}}><span className="dash"></span>Project enquiry form</div>
        <ContactForm/>
      </div>
      <aside className="contact-meta">
        <div className="block">
          <h3>For new <em>projects</em></h3>
          <p><a href="mailto:hello@ashman.studio">hello@ashman.studio</a></p>
          <p style={{color:'var(--mid)'}}>Akash reads every enquiry. Two-day reply window.</p>
        </div>
        <div className="block">
          <h3>For <em>press</em></h3>
          <p><a href="mailto:press@ashman.studio">press@ashman.studio</a></p>
          <p style={{color:'var(--mid)'}}>Imagery, interviews and editorial requests routed through the studio.</p>
        </div>
        <div className="block">
          <h3>For <em>careers</em></h3>
          <p><a href="mailto:careers@ashman.studio">careers@ashman.studio</a></p>
          <p style={{color:'var(--mid)'}}>Four roles open — see <a href="about.html#careers" style={{borderBottom:'.5px solid var(--accent)'}}>About → Careers</a>.</p>
        </div>
        <div className="block">
          <h3>Follow the <em>studio</em></h3>
          <p>
            <a href="#" style={{marginRight: 18}}>Instagram ↗</a>
            <a href="#" style={{marginRight: 18}}>LinkedIn ↗</a>
            <a href="#">Are.na ↗</a>
          </p>
        </div>
      </aside>
    </div>
  </section>
);

const MapDelhi = () => (
  <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="300" fill="#0e0e0d"/>
    {/* radial city — Connaught / Lutyens-style */}
    <circle cx="200" cy="160" r="120" fill="none" stroke="#2c2925" strokeWidth=".5"/>
    <circle cx="200" cy="160" r="80" fill="none" stroke="#2c2925" strokeWidth=".5"/>
    <circle cx="200" cy="160" r="40" fill="none" stroke="#2c2925" strokeWidth=".5"/>
    {[0,45,90,135,180,225,270,315].map(a => {
      const rad = a*Math.PI/180;
      return <line key={a} x1="200" y1="160" x2={200+Math.cos(rad)*180} y2={160+Math.sin(rad)*180} stroke="#2c2925" strokeWidth=".5"/>;
    })}
    <circle cx="160" cy="180" r="32" fill="none" stroke="#c8502a" strokeWidth=".6" opacity=".5"/>
    <circle cx="160" cy="180" r="16" fill="none" stroke="#c8502a" strokeWidth=".8" opacity=".7"/>
    <circle cx="160" cy="180" r="5" fill="#c8502a"/>
    <text x="180" y="178" fontFamily="Syne, sans-serif" fontSize="8" letterSpacing="2" fill="#e8b49e" fontWeight="700">HAUZ KHAS · HQ</text>
    <text x="20" y="284" fontFamily="Syne, sans-serif" fontSize="7" letterSpacing="1.5" fill="#7a7670">110016 · 28.5535° N</text>
    <text x="380" y="22" fontFamily="Syne, sans-serif" fontSize="7" letterSpacing="1.5" fill="#7a7670" textAnchor="end">↑ N</text>
  </svg>
);
const MapChandigarh = () => (
  <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="300" fill="#0e0e0d"/>
    {/* Le Corbusier sector grid */}
    <g stroke="#2c2925" strokeWidth=".5" fill="none">
      {[60, 130, 200, 270, 340].map(x => <line key={x} x1={x} y1="20" x2={x} y2="280"/>)}
      {[60, 130, 200].map(y => <line key={y} x1="20" y1={y+20} x2="380" y2={y+20}/>)}
    </g>
    {/* sector numbers ghosted */}
    <text x="95" y="55" fontFamily="Syne, sans-serif" fontSize="7" fill="#3a3530" letterSpacing="1.5">22</text>
    <text x="165" y="55" fontFamily="Syne, sans-serif" fontSize="7" fill="#3a3530" letterSpacing="1.5">17</text>
    <text x="235" y="55" fontFamily="Syne, sans-serif" fontSize="7" fill="#3a3530" letterSpacing="1.5">8</text>
    <text x="95" y="125" fontFamily="Syne, sans-serif" fontSize="7" fill="#3a3530" letterSpacing="1.5">23</text>
    <text x="165" y="125" fontFamily="Syne, sans-serif" fontSize="7" fill="#3a3530" letterSpacing="1.5">16</text>
    <text x="235" y="125" fontFamily="Syne, sans-serif" fontSize="7" fill="#3a3530" letterSpacing="1.5">9</text>
    {/* studio marker on sector 17 */}
    <circle cx="165" cy="95" r="32" fill="none" stroke="#c8502a" strokeWidth=".6" opacity=".5"/>
    <circle cx="165" cy="95" r="16" fill="none" stroke="#c8502a" strokeWidth=".8" opacity=".7"/>
    <circle cx="165" cy="95" r="5" fill="#c8502a"/>
    <text x="185" y="93" fontFamily="Syne, sans-serif" fontSize="8" letterSpacing="2" fill="#e8b49e" fontWeight="700">SECTOR 17-C</text>
    <text x="20" y="284" fontFamily="Syne, sans-serif" fontSize="7" letterSpacing="1.5" fill="#7a7670">160017 · 30.7415° N</text>
    <text x="380" y="22" fontFamily="Syne, sans-serif" fontSize="7" letterSpacing="1.5" fill="#7a7670" textAnchor="end">↑ N</text>
  </svg>
);
const MapDubai = () => (
  <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
    <rect width="400" height="300" fill="#0e0e0d"/>
    {/* gulf coast curve */}
    <path d="M 0 90 Q 100 100 220 130 T 400 180" fill="#1c2a38" opacity=".35"/>
    <path d="M 0 90 Q 100 100 220 130 T 400 180" fill="none" stroke="#3a3530" strokeWidth=".5"/>
    {/* Sheikh Zayed Road — long diagonal */}
    <line x1="60" y1="260" x2="360" y2="110" stroke="#2c2925" strokeWidth=".7"/>
    {/* secondary roads */}
    <g stroke="#2c2925" strokeWidth=".5" fill="none">
      <line x1="100" y1="230" x2="320" y2="60"/>
      <line x1="40" y1="190" x2="380" y2="230"/>
      <line x1="160" y1="40" x2="260" y2="280"/>
    </g>
    <circle cx="190" cy="200" r="32" fill="none" stroke="#c8502a" strokeWidth=".6" opacity=".5"/>
    <circle cx="190" cy="200" r="16" fill="none" stroke="#c8502a" strokeWidth=".8" opacity=".7"/>
    <circle cx="190" cy="200" r="5" fill="#c8502a"/>
    <text x="210" y="198" fontFamily="Syne, sans-serif" fontSize="8" letterSpacing="2" fill="#e8b49e" fontWeight="700">ALSERKAL · AL QUOZ</text>
    <text x="20" y="284" fontFamily="Syne, sans-serif" fontSize="7" letterSpacing="1.5" fill="#7a7670">DXB · 25.1411° N</text>
    <text x="380" y="22" fontFamily="Syne, sans-serif" fontSize="7" letterSpacing="1.5" fill="#7a7670" textAnchor="end">↑ N</text>
  </svg>
);

const STUDIOS = [
  {
    id: 'delhi', city: 'New Delhi', em: true, role: 'Headquarters · Strategy · Wayfinding',
    addr: <>Block 4, Hauz Khas Village<br/>South Delhi 110016<br/>India</>,
    phone: '+91 11 4612 0042',
    email: 'delhi@ashman.studio',
    map: <MapDelhi/>,
    meta: [
      { k: 'Founder', v: <>Akash <em>Manna</em></> },
      { k: 'Hours', v: '09:30 — 19:30 IST' },
      { k: 'Founded', v: '2024' },
      { k: 'Team', v: '7 people' }
    ]
  },
  {
    id: 'chandigarh', city: 'Chandigarh', em: false, role: 'Sign Design · Heritage Retail',
    addr: <>SCO 142, Sector 17-C<br/>Chandigarh 160017<br/>India</>,
    phone: '+91 172 4012 008',
    email: 'chandigarh@ashman.studio',
    map: <MapChandigarh/>,
    meta: [
      { k: 'Lead', v: <>Arsalan</> },
      { k: 'Hours', v: '09:30 — 19:30 IST' },
      { k: 'Opened', v: '2025' },
      { k: 'Team', v: '3 people' }
    ]
  },
  {
    id: 'dubai', city: 'Dubai', em: false, role: 'Activation · Retail · Gulf',
    addr: <>Unit 17, Alserkal Avenue<br/>Al Quoz 1, Dubai<br/>United Arab Emirates</>,
    phone: '+971 4 380 6620',
    email: 'dubai@ashman.studio',
    map: <MapDubai/>,
    meta: [
      { k: 'Lead', v: <>Anamika</> },
      { k: 'Hours', v: '08:00 — 18:00 GST' },
      { k: 'Opened', v: '2026' },
      { k: 'Team', v: '2 people' }
    ]
  }
];

const Studios = () => (
  <section id="studios">
    <div className="ash-wrap">
      <div className="section-head">
        <div className="left">
          <div className="num">— 02 / Studios</div>
          <h2>Three <em>cities</em>.</h2>
        </div>
        <p className="lede">
          We work where the work is. New Delhi anchors strategy, brand and wayfinding;
          Chandigarh handles Punjab and Haryana sign design and heritage retail;
          Dubai runs Gulf engagements.
        </p>
      </div>
    </div>
    {STUDIOS.map(s => (
      <article key={s.id} id={s.id} className="studio-card">
        <div className="map">{s.map}</div>
        <div className="body">
          <div>
            <div className="lab">{s.role}</div>
            <h2>{s.em ? <em>{s.city}</em> : s.city}</h2>
            <div className="role">— Studio {STUDIOS.indexOf(s) + 1} of 3</div>
            <div className="lines">
              {s.addr}<br/><br/>
              <a href={'mailto:' + s.email}>{s.email}</a><br/>
              {s.phone}
            </div>
          </div>
          <div className="meta">
            {s.meta.map(m => (
              <div key={m.k}>
                <div className="k">{m.k}</div>
                <div className="v">{m.v}</div>
              </div>
            ))}
          </div>
        </div>
      </article>
    ))}
  </section>
);

const App = () => (
  <>
    <Nav current="contact"/>
    <Ticker paper/>
    <PageHead/>
    <ContactBlock/>
    <Studios/>
    <Footer/>
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
